<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Binary Coffee</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <a class="header-name" target="_blank" rel="noopener noreferrer" href="https://binarycoffee.dev">
            Binary <img src="../icons/icon48.png" height="16" alt="logo" /> Coffee
        </a>
        <div class="header-actions">
            <button id="btn-search" class="header-btn" title="Buscar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
            <button id="btn-dark-mode" class="header-btn" title="Modo oscuro"><svg id="icon-theme" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
            <button id="btn-profile" class="header-btn" title="Perfil"><svg id="icon-profile" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
        </div>
    </header>

    <div id="search-bar" class="hidden">
        <div class="search-row">
            <input type="text" id="search-input" placeholder="Buscar articulos..." />
            <button id="search-close" class="header-btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div id="tag-filters" class="tag-filters"></div>
    </div>

    <!-- FEED VIEW -->

                </g>
            </svg>
        </div>
        <div id="post-container" class="post-container"></div>
        <button id="load-more" class="btn-load-more hidden">Cargar mas</button>
    </main>

    <!-- PROFILE VIEW -->
    <div id="view-profile" class="view hidden">
        <div class="view-header">
            <button id="btn-back-feed" class="btn-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Feed</button>
            <h2>Perfil</h2>
        </div>

        <div id="profile-logged-out" class="profile-section">
            <div class="login-box">
                <p>Inicia sesion para acceder a todas las funciones</p>
                <input type="text" id="token-input" placeholder="Pega tu JWT token aqui..." />
                <button id="btn-login" class="btn-primary">Iniciar sesion</button>
                <div class="login-divider"><span>o</span></div>
                <button id="btn-login-site" class="btn-secondary">Iniciar sesion via web</button>
                <p id="login-site-hint" class="hint hidden">Inicia sesion en binarycoffee.dev y luego:</p>
                <button id="btn-detect-token" class="btn-secondary hidden">Detectar sesion</button>
            </div>
        </div>

        <div id="profile-logged-in" class="profile-section hidden">
            <div class="profile-card">
                <img id="profile-avatar" class="profile-avatar-lg" src="" alt="" />
                <div class="profile-info">
                    <h3 id="profile-username"></h3>
                    <p id="profile-email" class="text-muted"></p>
                </div>
            </div>
            <div class="profile-actions">
                <button id="btn-my-posts" class="btn-menu"><svg class="menu-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Mis posts</button>
                <button id="btn-my-stats" class="btn-menu"><svg class="menu-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Estadisticas</button>
                <button id="btn-create-post" class="btn-menu"><svg class="menu-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Crear borrador</button>
                <button id="btn-notifications" class="btn-menu"><svg class="menu-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Notificaciones: ON</button>
                <button id="btn-subscribe" class="btn-menu"><svg class="menu-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Suscribirse al blog</button>
                <button id="btn-logout" class="btn-menu btn-danger"><svg class="menu-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Cerrar sesion</button>
            </div>
        </div>
    </div>

    <!-- MY POSTS VIEW -->
    <div id="view-my-posts" class="view hidden">
        <div class="view-header">
            <button id="btn-back-profile" class="btn-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Perfil</button>
            <h2>Mis Posts</h2>
        </div>
        <div id="my-posts-container" class="post-container"></div>
    </div>

    <!-- STATS VIEW -->
    <div id="view-stats" class="view hidden">
        <div class="view-header">
            <button id="btn-back-profile2" class="btn-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Perfil</button>
            <h2>Estadisticas</h2>
        </div>
        <div id="stats-content"></div>
    </div>

    <!-- CREATE POST VIEW -->
    <div id="view-create" class="view hidden">
        <div class="view-header">
            <button id="btn-back-feed2" class="btn-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Feed</button>
            <h2>Crear borrador</h2>
        </div>
        <form id="form-create" class="form-create">
            <input type="text" id="post-title" placeholder="Titulo del post" required />
            <textarea id="post-body" placeholder="Contenido (markdown)" rows="8" required></textarea>
            <button type="submit" class="btn-primary">Crear borrador</button>
        </form>
    </div>

    <!-- POST DETAIL VIEW -->
    <div id="view-detail" class="view hidden">
        <div class="view-header">
            <button id="btn-back-feed3" class="btn-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Feed</button>
            <h2>Detalle</h2>
        </div>
        <div id="detail-content"></div>
        <form id="form-comment" class="form-comment hidden">
            <input type="hidden" id="comment-post-id" />
            <textarea id="comment-body" placeholder="Escribe un comentario..." rows="3" required></textarea>
            <button type="submit" class="btn-primary">Comentar</button>
        </form>
    </div>

    <script src="../scripts/storage.js"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/app.js"></script>
</body>
</html>
